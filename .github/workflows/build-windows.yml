name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore QPARKShot.sln

      - name: Build (Release)
        run: pwsh ./scripts/build_release.ps1

      - name: Install WiX v4 (v7 requires OSMF EULA acceptance)
        run: dotnet tool install --global wix --version 4.0.5

      - name: Build MSI
        run: pwsh ./scripts/build_msi.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QPARKShot-Windows
          path: |
            build/Release/**
            build/Msi/*.msi

name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild (from pre-installed VS)
        uses: microsoft/setup-msbuild@v2

      - name: NuGet restore
        run: msbuild QPARKShot.sln -t:Restore -p:Configuration=Release -p:Platform=x64

      - name: Build + Publish
        run: |
          msbuild QPARKShot\QPARKShot.csproj `
            -t:Publish `
            -p:Configuration=Release `
            -p:Platform=x64 `
            -p:RuntimeIdentifier=win-x64 `
            -p:SelfContained=false `
            -p:PublishDir=build\Release\ `
            -p:PublishReadyToRun=false `
            -p:PublishSingleFile=false `
            -p:WindowsPackageType=None

      - name: List build output (debug)
        run: |
          Write-Host "==> build/Release contents:"
          if (Test-Path build/Release) {
            Get-ChildItem -Recurse build/Release | Select-Object FullName, Length | Format-Table -AutoSize | Out-String -Width 200
          } else {
            Write-Host "MISSING"
          }

      - name: Upload Release build (unpackaged)
        uses: actions/upload-artifact@v4
        with:
          name: QPARKShot-Windows-Release
          path: build/Release/**
          if-no-files-found: error

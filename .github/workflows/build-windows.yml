name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore QPARKShot.sln

      - name: Publish (self-contained, win-x64)
        run: |
          dotnet publish QPARKShot/QPARKShot.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishReadyToRun=false -p:PublishSingleFile=false `
            -o build/Release
          if ($LASTEXITCODE -ne 0) { throw "publish failed" }

      - name: Show output size
        run: |
          $size = (Get-ChildItem -Recurse build/Release | Measure-Object Length -Sum).Sum / 1MB
          Write-Host ("Total: {0:N1} MB" -f $size)
          $folders = (Get-ChildItem build/Release -Directory).Count
          $files = (Get-ChildItem build/Release -File).Count
          Write-Host "Folders: $folders, Files (top-level): $files"

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build NSIS installer
        run: |
          New-Item -ItemType Directory -Force -Path build/Installer | Out-Null
          & 'C:\Program Files (x86)\NSIS\makensis.exe' /V2 scripts/installer.nsi
          if ($LASTEXITCODE -ne 0) { throw "makensis failed" }
          Get-ChildItem build/Installer | Format-Table -AutoSize

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: QPARKShot-Setup
          path: build/Installer/QPARKShot-Setup-*.exe
          if-no-files-found: error

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: QPARKShot-Windows-Portable
          path: build/Release/**
          if-no-files-found: error

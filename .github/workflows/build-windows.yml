name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Show active SDK
        run: |
          dotnet --info | Select-String -Pattern "Version|RID" -SimpleMatch
          dotnet --list-sdks

      - name: Restore
        run: dotnet restore QPARKShot.sln

      - name: Build (Release)
        run: pwsh ./scripts/build_release.ps1

      - name: List build output (debug)
        run: |
          Write-Host "==> build/Release contents:"
          if (Test-Path build/Release) {
            Get-ChildItem -Recurse build/Release | Select-Object FullName, Length | Format-Table -AutoSize | Out-String -Width 200
          } else {
            Write-Host "MISSING"
          }

      - name: Upload Release build (unpackaged)
        uses: actions/upload-artifact@v4
        with:
          name: QPARKShot-Windows-Release
          path: build/Release/**
          if-no-files-found: error
